<svg xmlns="http://www.w3.org/2000/svg"
width="1600"
height="500"
viewBox="0 0 1600 500">

<defs>

<linearGradient id="bg"
x1="0"
y1="0"
x2="1"
y2="1">

<stop offset="0%" stop-color="#050608"/>

<stop offset="100%" stop-color="#0D1117"/>

</linearGradient>

<linearGradient id="cyan"

x1="0"
x2="1">

<stop offset="0%"
stop-color="#00E5FF"/>

<stop offset="100%"
stop-color="#3AF2FF"/>

</linearGradient>

<linearGradient id="brown"

x1="0"
x2="1">

<stop offset="0%"
stop-color="#7A5B3A"/>

<stop offset="100%"
stop-color="#5E4731"/>

</linearGradient>

<filter id="blur">

<feGaussianBlur stdDeviation="2"/>

</filter>

<filter id="glow">

<feDropShadow
dx="0"
dy="0"
stdDeviation="12"
flood-color="#00E5FF"/>

</filter>

</defs>

<!-- Background -->

<rect
width="1600"
height="500"
fill="url(#bg)"/>

<!-- Cyan Glow -->

<circle
cx="1220"
cy="140"
r="220"
fill="#00E5FF22"/>

<circle
cx="250"
cy="420"
r="180"
fill="#00E5FF11"/>

<!-- Spider Web -->

<g
stroke="#30363D"
stroke-width="1">

<line x1="0" y1="0" x2="250" y2="0"/>

<line x1="0" y1="0" x2="0" y2="250"/>

<line x1="0" y1="0" x2="220" y2="220"/>

<path
d="M0 40 Q90 10 180 0"/>

<path
d="M0 80 Q120 35 250 0"/>

<path
d="M40 0 Q10 90 0 180"/>

<path
d="M80 0 Q40 120 0 250"/>

</g>

<!-- Chains -->

<g
stroke="#7A5B3A"
stroke-width="3"
fill="none">

<ellipse
cx="1410"
cy="20"
rx="12"
ry="20"/>

<ellipse
cx="1410"
cy="55"
rx="12"
ry="20"
transform="rotate(40 1410 55)"/>

<ellipse
cx="1410"
cy="90"
rx="12"
ry="20"/>

<ellipse
cx="1410"
cy="125"
rx="12"
ry="20"
transform="rotate(40 1410 125)"/>

<ellipse
cx="1410"
cy="160"
rx="12"
ry="20"/>

</g>

<!-- Glass Card -->

<rect

x="80"

y="70"

width="770"

height="360"

rx="28"

fill="#FFFFFF08"

stroke="#00E5FF55"/>

<!-- Title -->

<text

x="130"

y="150"

fill="white"

font-size="48"

font-family="Segoe UI"

font-weight="700">

Sameeksha Singh

</text>

<!-- Subtitle -->

<text

x="130"

y="195"

fill="#00E5FF"

font-size="24"

font-family="Segoe UI">

Aspiring AI Engineer

</text>

<!-- Quote -->

<text

x="130"

y="250"

fill="#B7C0CD"

font-size="22"

font-family="Segoe UI">

Curious mind turning ideas into

</text>

<text

x="130"

y="285"

fill="#B7C0CD"

font-size="22"

font-family="Segoe UI">

projects through AI, code,

</text>

<text

x="130"

y="320"

fill="#B7C0CD"

font-size="22"

font-family="Segoe UI">

and continuous learning.

</text>

<!-- Skills -->

<text

x="130"

y="385"

fill="#7A5B3A"

font-size="18"

font-family="Consolas">

Python • C++ • Machine Learning • DSA • Figma

</text>

<!-- Profile Placeholder -->

<image
href="./profile.jpeg"
x="1035"
y="80"
width="320"
height="340"
preserveAspectRatio="xMidYMid slice"/>

<rect
x="1035"
y="80"
width="320"
height="340"
fill="none"
stroke="#00E5FF"
stroke-width="3"/>

<rect
x="1025"
y="70"
width="340"
height="360"
fill="none"
stroke="#7A5B3A"
stroke-width="1"/>

<text

x="1128"

y="286"

fill="#9DA5B4"

font-size="14"

font-family="Segoe UI">

(blurred portrait)

</text>

<!-- Decorative Dots -->

<circle cx="890" cy="120" r="4" fill="#00E5FF"/>

<circle cx="930" cy="120" r="4" fill="#00E5FF"/>

<circle cx="970" cy="120" r="4" fill="#00E5FF"/>

<!-- Bottom Line -->

<line

x1="120"

y1="420"

x2="760"

y2="420"

stroke="url(#cyan)"

stroke-width="2"/>

</svg>
